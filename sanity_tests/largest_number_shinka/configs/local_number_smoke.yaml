max_evaluation_jobs: 1
max_proposal_jobs: 1
max_db_workers: 1
verbose: true
debug: false
evo_config:
  task_sys_msg: '

    You are solving a simple optimisation task.


    The program must define a function called run_task().

    The goal is to return the largest possible number between 0 and 100.

    The score is exactly the number returned by run_task(), but only if it is between
    0 and 100.

    The initial program returns 0.


    The optimal answer is 100.


    Important constraints:

    - Return a finite Python int or float.

    - Do not return infinity.

    - Do not return NaN.

    - Do not use float("inf"), math.inf, numpy.inf, or any non-finite value.

    - Do not return a number greater than 100.

    - Do not return a negative number.

    - Keep the program valid Python.

    - Do not change the required function name: run_task.

    '
  llm_models:
  - local/qwen2.5-coder:7b@http://localhost:11434/v1
  llm_dynamic_selection: null
  llm_kwargs:
    temperatures:
    - 0.0
    max_tokens: 4096
  patch_types:
  - full
  patch_type_probs:
  - 1.0
  max_patch_resamples: 4
  max_patch_attempts: 2
  max_novelty_attempts: 1
  embedding_model: null
  novelty_llm_models: null
  meta_rec_interval: null
  meta_llm_models:
  - local/qwen2.5-coder:7b@http://localhost:11434/v1
  use_text_feedback: true
  evolve_prompts: false
  max_api_costs: null
  num_generations: 3
  results_dir: results/results_largest_number_shinka_smoke
db_config:
  num_islands: 1
  archive_size: 10
  elite_selection_ratio: 0.3
  parent_selection_strategy: weighted
  parent_selection_lambda: 10
  num_archive_inspirations: 0
  num_top_k_inspirations: 0
  migration_interval: 10
  migration_rate: 0.0
  island_elitism: true
  enforce_island_separation: true
job_config:
  eval_program_path: evaluate.py
  time: 00:05:00
  numeric_threads_per_job: 1
