max_evaluation_jobs: 1
max_proposal_jobs: 1
max_db_workers: 1
verbose: true
debug: false

evo_config:
  task_sys_msg: >
    Improve the Python program for packing exactly 26 circles inside a unit square.
    The objective is to maximize the sum of circle radii while always producing a
    geometrically valid solution.

    Make small, targeted modifications. Do not rewrite the whole program.
    Prefer modifying compute_max_radii while initially keeping the existing centers.

    A safe improvement is to formulate the radius calculation as a linear program:
    maximize sum(r_i), subject to r_i >= 0,
    r_i <= min(x_i, y_i, 1-x_i, 1-y_i),
    and r_i + r_j <= distance(center_i, center_j) for every pair.

    scipy.optimize.linprog may be used.

    The evaluator uses zero numerical tolerance. After optimization, slightly contract
    every positive radius, for example by multiplying by 1 - 1e-9, so that floating
    point roundoff cannot create overlaps or boundary violations.

    Preserve run_packing, required return values, array shapes, and the immutable code
    outside the EVOLVE block. Never generate centers outside [0, 1]. Never report a
    radius sum different from numpy.sum(radii).

  llm_models:
    - "local/qwen2.5-coder:7b@http://localhost:11434/v1"

  llm_dynamic_selection: null

  llm_kwargs:
    temperatures:
      - 0.0
    max_tokens: 4096

  patch_types:
    - diff

  patch_type_probs:
    - 1.0

  max_patch_resamples: 4
  max_patch_attempts: 2
  max_novelty_attempts: 1

  embedding_model: null
  novelty_llm_models: null
  meta_rec_interval: null
  meta_llm_models: null

  use_text_feedback: true
  evolve_prompts: false
  max_api_costs: null

db_config:
  num_islands: 1
  archive_size: 10
  elite_selection_ratio: 0.3
  parent_selection_strategy: weighted
  parent_selection_lambda: 10
  num_archive_inspirations: 0
  num_top_k_inspirations: 0
  migration_interval: 10
  migration_rate: 0.0
  island_elitism: true
  enforce_island_separation: true

job_config:
  eval_program_path: evaluate.py
  time: "00:05:00"
  numeric_threads_per_job: 1
